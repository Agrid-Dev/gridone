name: CI

on:
  pull_request:
    branches:
      - "*"
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Show tool versions
        run: |
          uv run ruff --version
          uv run ty --version

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run type check
        run: uv run ty check

  unit-tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Run unit tests with coverage
        run: uv run coverage run -m pytest -m "not integration"

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: unit
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Write mosquitto config (allow anonymous)
        run: |
          cat > /tmp/mosquitto.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF

      - name: Start Mosquitto
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull thermocktat image
        run: docker pull ghcr.io/agrid-dev/thermocktat:v0.5.0

      - name: Run integration tests with coverage
        env:
          POSTGRES_TEST_URL: postgresql://postgres:test@localhost:5432/postgres
        run: uv run coverage run -m pytest -m integration

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: integration
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-image:
    name: Build image (${{ matrix.platform_tag }})
    runs-on: ubuntu-latest
    needs: integration-tests
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: gridone:local
          outputs: type=docker,dest=/tmp/image-${{ matrix.platform_tag }}.tar
          cache-from: type=gha,scope=${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_tag }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.platform_tag }}
          path: /tmp/image-${{ matrix.platform_tag }}.tar
          retention-days: 7
          if-no-files-found: error
