name: CI

on:
  pull_request:
    branches:
      - "*"
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
  workflow_dispatch:
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      assets: ${{ steps.filter.outputs.assets }}
      automations: ${{ steps.filter.outputs.automations }}
      commands: ${{ steps.filter.outputs.commands }}
      devices_manager: ${{ steps.filter.outputs.devices_manager }}
      notifications: ${{ steps.filter.outputs.notifications }}
      timeseries: ${{ steps.filter.outputs.timeseries }}
    steps:
      - uses: actions/checkout@v6

      # A change to a shared dependency (models, lockfile, docker image, or this
      # workflow) can break any package, so each filter includes the &shared set
      # — that flips every package true and runs the full integration suite.
      - uses: dorny/paths-filter@v4
        id: filter
        if: github.event_name == 'pull_request'
        with:
          filters: |
            shared: &shared
              - 'packages/models/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/**'
              - '.github/workflows/ci_core.yml'
            assets:
              - *shared
              - 'packages/assets/**'
            automations:
              - *shared
              - 'packages/automations/**'
            commands:
              - *shared
              - 'packages/commands/**'
            devices_manager:
              - *shared
              - 'packages/devices_manager/**'
            notifications:
              - *shared
              - 'packages/notifications/**'
            timeseries:
              - *shared
              - 'packages/timeseries/**'

  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Show tool versions
        run: |
          uv run ruff --version
          uv run ty --version

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run type check
        run: uv run ty check

  unit-tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Run unit tests with coverage
        run: uv run coverage run -m pytest -m "not integration"

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: unit
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: [unit-tests, changes]
    # Skip on PRs that touch no integration-bearing package; always run on push to main.
    if: >-
      github.event_name != 'pull_request' ||
      needs.changes.outputs.assets == 'true' ||
      needs.changes.outputs.automations == 'true' ||
      needs.changes.outputs.commands == 'true' ||
      needs.changes.outputs.devices_manager == 'true' ||
      needs.changes.outputs.notifications == 'true' ||
      needs.changes.outputs.timeseries == 'true'

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Write mosquitto config (allow anonymous)
        run: |
          cat > /tmp/mosquitto.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF

      - name: Start Mosquitto
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull thermocktat image
        run: docker pull ghcr.io/agrid-dev/thermocktat:v0.7.0

      - name: Run integration tests with coverage
        env:
          POSTGRES_TEST_URL: postgresql://postgres:test@localhost:5432/postgres
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            uv run coverage run -m pytest -m integration
          else
            paths=()
            [ "${{ needs.changes.outputs.assets }}" = "true" ] && paths+=(packages/assets)
            [ "${{ needs.changes.outputs.automations }}" = "true" ] && paths+=(packages/automations)
            [ "${{ needs.changes.outputs.commands }}" = "true" ] && paths+=(packages/commands)
            [ "${{ needs.changes.outputs.devices_manager }}" = "true" ] && paths+=(packages/devices_manager)
            [ "${{ needs.changes.outputs.notifications }}" = "true" ] && paths+=(packages/notifications)
            [ "${{ needs.changes.outputs.timeseries }}" = "true" ] && paths+=(packages/timeseries)
            echo "Running integration tests for: ${paths[*]}"
            uv run coverage run -m pytest -m integration "${paths[@]}"
          fi

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          flags: integration
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
