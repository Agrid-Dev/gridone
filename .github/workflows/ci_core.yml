name: CI

on:
  pull_request:
    branches:
      - "*"
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - docker/**
      - pyproject.toml
      - uv.lock
  workflow_dispatch:
jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Show tool versions
        run: |
          uv run ruff --version
          uv run ty --version

      - name: Run Ruff check
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run type check
        run: uv run ty check

  unit-tests:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Run unit tests with coverage
        run: uv run coverage run -m pytest -m "not integration"

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: unit
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg18
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          version: "0.10.9"

      - name: Install dependencies (locked)
        run: uv sync --locked --all-groups --all-packages

      - name: Write mosquitto config (allow anonymous)
        run: |
          cat > /tmp/mosquitto.conf <<'EOF'
          listener 1883 0.0.0.0
          allow_anonymous true
          persistence false
          EOF

      - name: Start Mosquitto
        run: |
          docker run -d --name mosquitto \
            -p 1883:1883 \
            -v /tmp/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro \
            eclipse-mosquitto:2.0

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull thermocktat image
        run: docker pull ghcr.io/agrid-dev/thermocktat:v0.5.0

      - name: Run integration tests with coverage
        env:
          POSTGRES_TEST_URL: postgresql://postgres:test@localhost:5432/postgres
        run: uv run coverage run -m pytest -m integration

      - name: Build xml report
        run: uv run coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          flags: integration
          fail_ci_if_error: true
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build-image:
    name: Build image (${{ matrix.platform_tag }})
    runs-on: ubuntu-latest
    needs: integration-tests
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            platform_tag: amd64
          - platform: linux/arm64
            platform_tag: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          tags: gridone:local
          outputs: type=docker,dest=/tmp/image-${{ matrix.platform_tag }}.tar
          cache-from: type=gha,scope=${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform_tag }}

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.platform_tag }}
          path: /tmp/image-${{ matrix.platform_tag }}.tar
          retention-days: 7
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-image
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Wait for version tag
        id: tag
        run: |
          # The bump workflow runs in parallel and creates a version tag
          # on a bump commit whose parent is this merge commit.
          # Poll until that tag appears (usually takes <1 min).
          for i in $(seq 1 30); do
            git fetch --tags --quiet
            for tag in $(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -5); do
              TAG_PARENT=$(git rev-parse "${tag}^" 2>/dev/null || echo "")
              if [ "$TAG_PARENT" = "${{ github.sha }}" ]; then
                echo "Found version tag: $tag (parent is merge commit ${{ github.sha }})"
                echo "tag=$tag" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done

            echo "Attempt $i/30: No version tag yet, waiting 30s..."
            sleep 30
          done

          echo "::warning::No version tag found after 15 minutes — skipping release"
          exit 0

      - name: Download image artifacts
        if: steps.tag.outputs.tag != ''
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts
          pattern: image-*

      - name: Install skopeo
        if: steps.tag.outputs.tag != ''
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Set up Docker Buildx
        if: steps.tag.outputs.tag != ''
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.tag.outputs.tag != ''
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        if: steps.tag.outputs.tag != ''
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Push platform images
        if: steps.tag.outputs.tag != ''
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${VERSION#v}"

          for arch in amd64 arm64; do
            skopeo copy \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "docker-archive:/tmp/artifacts/image-${arch}/image-${arch}.tar" \
              "docker://${IMAGE}:${VERSION}-${arch}"
          done

      - name: Create and push manifest
        if: steps.tag.outputs.tag != ''
        id: manifest
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"

          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.tag.outputs.tag != ''
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        if: steps.tag.outputs.tag != ''
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.manifest.outputs.digest }}"

      - name: Generate changelog
        if: steps.tag.outputs.tag != ''
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          {
            echo "## Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${{ steps.meta.outputs.image }}:${TAG}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              echo "Initial release"
            fi
          } > /tmp/changelog.md

      - name: Create GitHub Release
        if: steps.tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.tag.outputs.tag }}" \
            --title "${{ steps.tag.outputs.tag }}" \
            --notes-file /tmp/changelog.md
