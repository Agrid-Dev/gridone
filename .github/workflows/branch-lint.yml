name: Branch Lint

on:
  pull_request:

jobs:
  linear-branch:
    name: Linear Issue Branch
    runs-on: ubuntu-latest
    steps:
      - name: Check branch is linked to a Linear issue
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          # Dependabot branches (dependabot/...) aren't tied to a Linear issue.
          # Run the check (so the required status still reports) but pass it.
          if [ "${{ github.actor }}" = "dependabot[bot]" ]; then
            echo "Dependabot PR — Linear issue link not required."
            exit 0
          fi
          if ! echo "$BRANCH" | grep -qiE 'agr-[0-9]+'; then
            echo "::error::branch is not linked to a linear issue"
            exit 1
          fi
