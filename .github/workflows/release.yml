name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_run'
      && github.event.workflow_run.conclusion == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          TAGS="${IMAGE}:${SHORT_SHA}"
          TAGS="${TAGS},${IMAGE}:latest"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          DIGEST=$(docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:latest" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${{ steps.meta.outputs.image }}@${DIGEST}"

  github-release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          {
            echo "## Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${{ steps.meta.outputs.image }}:${SHORT_SHA}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              echo "Initial release"
            fi
          } > /tmp/changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
