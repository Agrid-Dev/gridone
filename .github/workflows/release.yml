name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find CI run that tested this commit
        id: ci-run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          echo "Looking for successful CI run on commit $COMMIT_SHA"

          for i in $(seq 1 30); do
            RUN_ID=$(gh api \
              "repos/${{ github.repository }}/actions/workflows/ci_core.yml/runs?head_sha=${COMMIT_SHA}&status=success&per_page=1" \
              --jq '.workflow_runs[0].id // empty')

            if [ -n "$RUN_ID" ]; then
              echo "Found successful CI run: $RUN_ID"
              echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Attempt $i/30: No successful CI run yet, waiting 60s..."
            sleep 60
          done

          echo "::error::No successful CI run found for commit $COMMIT_SHA after 30 minutes"
          exit 1

      - name: Download amd64 image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-amd64
          path: /tmp/artifacts
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download arm64 image artifact
        uses: actions/download-artifact@v4
        with:
          name: image-arm64
          path: /tmp/artifacts
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Push platform images
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${GITHUB_REF_NAME#v}"

          for arch in amd64 arm64; do
            skopeo copy \
              --dest-creds "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
              "docker-archive:/tmp/artifacts/image-${arch}.tar" \
              "docker://${IMAGE}:${VERSION}-${arch}"
          done

      - name: Create and push manifest
        id: manifest
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"

          docker buildx imagetools create \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:${VERSION}" \
            -t "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"

          DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" --format '{{.Manifest.Digest}}')
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.manifest.outputs.digest }}"

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          {
            echo "## Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${{ steps.meta.outputs.image }}:${TAG}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              echo "Initial release"
            fi
          } > /tmp/changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
