name: Release

on:
  push:
    tags: ["v[0-9]*.[0-9]*.[0-9]*"]

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  # Build each platform on its own native runner (no QEMU emulation) and push
  # the result by digest. The manifest list is assembled in the `merge` job.
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare
        run: |
          echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone" >> "$GITHUB_ENV"
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: ${{ matrix.platform }}
          # Push the image content by digest only (no tag); the merge job stitches
          # the per-platform digests into one multi-arch manifest list.
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # Registry-backed build cache, scoped per platform so the two native
          # legs never evict each other's layers. The GHA cache (type=gha) has a
          # hard 10 GB/repo cap that LRU-evicts layers across releases; a
          # dedicated :buildcache-<platform> tag has no such cap.
          cache-from: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  # Release gate: run the acceptance suite against the freshly built amd64 image
  # (by digest, no rebuild) so the manifest we tag below is the exact bytes the
  # suite passed against. amd64 only, same as PR CI. If this fails, `merge` and
  # `github-release` never run, so a failing release publishes only the
  # digest-only blobs already pushed by `build` — no tags, no signature, no
  # GitHub release.
  acceptance:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The amd64 leg of `build` uploads a single file named after the pushed
      # image digest. Reading it back is deterministic — unlike a matrix job
      # output, where the arm64 leg would race to clobber the value with an
      # empty string.
      - name: Download amd64 digest
        uses: actions/download-artifact@v8
        with:
          name: digests-linux-amd64
          path: ${{ runner.temp }}/digests

      - name: Resolve image ref
        id: image
        run: |
          digest=$(ls "${{ runner.temp }}/digests")
          image="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          echo "ref=${image}@sha256:${digest}" >> "$GITHUB_OUTPUT"

      # Pull before `compose up` so the image is present locally and the stack
      # runs it as-is instead of rebuilding from the compose `build:` section.
      - name: Pull image by digest
        run: docker pull "${{ steps.image.outputs.ref }}"

      - name: Run acceptance suite
        uses: ./.github/actions/acceptance-suite
        with:
          image: ${{ steps.image.outputs.ref }}

  # Merge the per-platform digests into a single tagged multi-arch manifest and
  # sign the result. Gated on acceptance so tags only ever point at a tested image.
  merge:
    runs-on: ubuntu-latest
    needs: [build, acceptance]
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image metadata
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:7}"
          VERSION="${GITHUB_REF_NAME}"
          {
            echo "image=${IMAGE}"
            echo "short_sha=${SHORT_SHA}"
            echo "version=${VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Create multi-arch manifest and push
        working-directory: ${{ runner.temp }}/digests
        run: |
          # Each file in this dir is named after a per-platform image digest
          # (sha256 hex, no prefix). Turn them into image@sha256:<digest> refs.
          refs=()
          for digest in *; do
            refs+=("${{ steps.meta.outputs.image }}@sha256:${digest}")
          done
          docker buildx imagetools create \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.short_sha }}" \
            -t "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}" \
            -t "${{ steps.meta.outputs.image }}:latest" \
            "${refs[@]}"

      - name: Inspect manifest
        run: |
          docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:${{ steps.meta.outputs.version }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image
        run: |
          DIGEST=$(docker buildx imagetools inspect "${{ steps.meta.outputs.image }}:latest" --format '{{.Manifest.Digest}}')
          cosign sign --yes "${{ steps.meta.outputs.image }}@${DIGEST}"

  # Gated on merge (and therefore acceptance): the release notes advertise a
  # `docker pull …:vX.Y.Z` that only exists once merge has tagged the manifest,
  # so a failing acceptance suite must not cut a GitHub release either.
  github-release:
    runs-on: ubuntu-latest
    needs: merge
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Normalize image name
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/gridone"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          TAG="${GITHUB_REF_NAME}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          PREV_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]' | sed -n '2p')

          {
            echo "## Docker Image"
            echo ""
            echo '```'
            echo "docker pull ${{ steps.meta.outputs.image }}:${TAG}"
            echo '```'
            echo ""
            echo "## Changes"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              git log --pretty=format:"- %s (%h)" "${PREV_TAG}..${TAG}"
            else
              echo "Initial release"
            fi
          } > /tmp/changelog.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/changelog.md
