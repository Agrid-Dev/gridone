site_name: Gridone
site_url: https://docs.gridone.a-grid.com
site_description: Open building management system — control, record, and automate your building infrastructure.
repo_url: https://github.com/Agrid-Dev/gridone
repo_name: Agrid-Dev/gridone

docs_dir: src

theme:
  name: material
  custom_dir: src/overrides
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 AGRID

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Agrid-Dev/gridone
      name: Gridone on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/a-grid/
      name: A-Grid on LinkedIn
    - icon: fontawesome/solid/globe
      link: https://www.a-grid.com/
      name: a-grid.com

plugins:
  - search
  - swagger-ui-tag

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - For Operators: getting-started/operators.md
    - For Integrators: getting-started/integrators.md
    - For Developers: getting-started/developers.md
  - Guides:
    - Devices:
      - Add a device: guides/devices/add-device.md
      - Discover devices: guides/devices/discover.md
    - Drivers:
      - Write a driver: guides/drivers/write-driver.md
    - Automations:
      - Create an automation: guides/automations/create.md
      - Monitor executions: guides/automations/executions.md
    - Commands:
      - Send a command: guides/commands/send-command.md
      - Create a command template: guides/commands/templates.md
    - Faults:
      - View active faults: guides/faults/active-faults.md
    - Notifications:
      - View and dismiss notifications: guides/notifications/notifications.md
  - Reference:
    - Glossary: reference/glossary.md
    - Driver Schema:
      - General Layout: reference/driver-schema/general-layout.md
      - Transport Addresses: reference/driver-schema/transport-addresses.md
      - Codecs: reference/driver-schema/codecs.md
      - Update Strategy: reference/driver-schema/update-strategy.md
    - Devices: reference/devices.md
    - Standard Devices: reference/standard-devices.md
    - Transports: reference/transports.md
    - API Reference: api-reference.md
