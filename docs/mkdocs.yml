site_name: Gridone
site_url: https://docs.gridone.a-grid.com
site_description: Open building management system — control, record, and automate your building infrastructure.
repo_url: https://github.com/Agrid-Dev/gridone
repo_name: Agrid-Dev/gridone

docs_dir: src

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2026 AGRID

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Agrid-Dev/gridone
      name: Gridone on GitHub
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/company/a-grid/
      name: A-Grid on LinkedIn
    - icon: fontawesome/solid/globe
      link: https://www.a-grid.com/
      name: a-grid.com

plugins:
  - search
  - swagger-ui-tag

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - User Guide:
    - Devices: guide/devices.md
    - Standard Devices: guide/standard-devices.md
    - Driver Schema Reference:
      - General Layout: guide/general-layout.md
      - Transport Addresses: guide/transport-addresses.md
      - Value Adapters: guide/value-adapters.md
    - Transports: guide/transports.md
  - API Reference: api-reference.md
