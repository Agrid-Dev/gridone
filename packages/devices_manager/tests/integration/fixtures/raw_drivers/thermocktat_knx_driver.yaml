id: thermocktat_knx
transport: knx
type: thermostat

device_config:
  - name: ga_main
    default: "1"
  - name: ga_middle
    default: "0"

attributes:
  - name: onoff_state
    data_type: bool
    read_write: "${ga_main}/${ga_middle}/0"
    codecs:
      - knx_dpt: "1.001"

  - name: temperature_setpoint
    data_type: float
    read_write: "${ga_main}/${ga_middle}/1"
    codecs:
      - knx_dpt: "9.001"

  - name: temperature_setpoint_min
    data_type: float
    read_write: "${ga_main}/${ga_middle}/2"
    codecs:
      - knx_dpt: "9.001"

  - name: temperature_setpoint_max
    data_type: float
    read_write: "${ga_main}/${ga_middle}/3"
    codecs:
      - knx_dpt: "9.001"

  - name: temperature
    data_type: float
    read: "${ga_main}/${ga_middle}/4"
    codecs:
      - knx_dpt: "9.001"

  - name: mode
    data_type: str
    read_write: "${ga_main}/${ga_middle}/5"
    codecs:
      - knx_dpt: "5.010"
      - mapping:
          1: "heat"
          2: "cool"
          3: "fan"
          4: "auto"

  - name: fan_speed
    data_type: str
    read_write: "${ga_main}/${ga_middle}/6"
    codecs:
      - knx_dpt: "5.010"
      - mapping:
          1: "auto"
          2: "low"
          3: "medium"
          4: "high"
