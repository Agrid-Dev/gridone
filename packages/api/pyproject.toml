[project]
name = "gridone-api"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = []
requires-python = ">=3.13"
dependencies = [
    "gridone-models",
    "gridone-apps",
    "gridone-assets",
    "gridone-automations",
    "gridone-commands",
    "gridone-notifications",
    "fastapi>=0.123.8",
    "gridone-users",
    "httpx>=0.28.1",
    "python-jose[cryptography]>=3.3.0",
    "pydantic-settings>=2.12.0",
    "python-multipart>=0.0.18",
]

[tool.uv]
workspaces=true


[build-system]
requires = ["uv_build>=0.9.7,<0.10.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
module-name = "api"
module-root = "src"

[tool.ruff.lint]
# Ruff resolves the nearest pyproject.toml per file, so this nested block
# overrides the root [tool.ruff.lint] for everything under packages/api/.
# That silently disables the root's `select = ["ALL"]`. Until we harmonize
# (see follow-up), explicitly extend-select rules we want enforced here.
extend-select = ["SLF001"]
ignore = []

[tool.pytest.ini_options]
pythonpath = ["src", "../models/src", "../users/src", "../apps/src", "../assets/src", "../automations/src", "../commands/src", "../devices_manager/src", "../timeseries/src", "../notifications/src"]
