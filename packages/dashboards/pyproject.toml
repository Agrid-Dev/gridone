[project]
name = "gridone-dashboards"
version = "0.1.0"
description = "Dashboard and widget registry for the gridone UI"
readme = "README.md"
authors = []
requires-python = ">=3.13"
dependencies = [
    "gridone-models",
    "asyncpg>=0.30.0",
    "pydantic>=2.0",
]

[build-system]
requires = ["uv_build>=0.9.7,<0.11.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
pythonpath = ["src", "../models/src", "tests"]
markers = [
    "integration: mark a test as an integration test",
]

[tool.uv.build-backend]
module-name = "dashboards"
module-root = "src"
