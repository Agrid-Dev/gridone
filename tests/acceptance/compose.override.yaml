# Device emulators — auto-merged into compose.yaml by every bare
# `docker compose up` (that is deliberate: inside tests/acceptance the only
# consumer is the test stack).
#
# Mirrors the demo overlay (gridone-demo files/docker-compose.override.yml)
# trimmed to what the suites use. Every emulator keeps its HTTP controller
# enabled and published on a host port (908x, same convention as the demo
# overlay): that is the external side-channel the suites use to change
# device state behind gridone's back
# (and the only reason tests ever talk to an emulator directly). gridone
# itself reaches the emulators on the compose network — never via these ports.
# The thermocktat image is FROM scratch (no shell), so no healthcheck is
# possible — it serves within milliseconds of starting, and the suites poll
# read-back values anyway.
services:
  thermocktat-http-0:
    image: ghcr.io/agrid-dev/thermocktat:v0.9.0
    environment:
      TMK_DEVICE_ID: TMK_http_0
      TMK_CONTROLLER: http
    ports:
      - "9080:8080"

  thermocktat-http-1:
    image: ghcr.io/agrid-dev/thermocktat:v0.9.0
    environment:
      TMK_DEVICE_ID: TMK_http_1
      TMK_CONTROLLER: http
    ports:
      - "9081:8080"

  thermocktat-modbus-0:
    image: ghcr.io/agrid-dev/thermocktat:v0.9.0
    environment:
      TMK_DEVICE_ID: TMK_modbus_0
      # Per-controller enables, NOT TMK_CONTROLLER (which would enable modbus
      # alone and kill the http side-channel).
      TMK_CONTROLLERS_HTTP_ENABLED: "true"
      TMK_CONTROLLERS_MODBUS_ENABLED: "true"
      # Float32 register pairs, matching the driver's byte_convert codecs
      # (the emulator default is 16-bit scaled ints).
      TMK_CONTROLLERS_MODBUS_REGISTER_COUNT: "2"
    ports:
      - "9082:8080"

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    # Anonymous local broker, config written inline (same as the demo overlay
    # and ci_core's mosquitto). Not published: only containers talk to it.
    # echo-chain (not printf): compose's string-command parsing strips
    # backslashes, so escape sequences never survive to the shell.
    command: >
      sh -c "echo 'listener 1883 0.0.0.0' > /mosquitto/config/mosquitto.conf
      && echo 'allow_anonymous true' >> /mosquitto/config/mosquitto.conf
      && echo 'persistence false' >> /mosquitto/config/mosquitto.conf
      && exec mosquitto -c /mosquitto/config/mosquitto.conf"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mosquitto_sub -t '$$SYS/broker/uptime' -C 1 -W 3 >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  thermocktat-mqtt-0:
    image: ghcr.io/agrid-dev/thermocktat:v0.9.0
    environment:
      TMK_DEVICE_ID: TMK_mqtt_0
      TMK_CONTROLLERS_HTTP_ENABLED: "true"
      TMK_CONTROLLERS_MQTT_ENABLED: "true"
      TMK_CONTROLLERS_MQTT_ADDR: tcp://mqtt-broker:1883
      # Snappy push cadence so external updates reach gridone within ~1s.
      TMK_CONTROLLERS_MQTT_PUBLISH_INTERVAL: 1s
    depends_on:
      mqtt-broker:
        condition: service_healthy
    ports:
      - "9083:8080"

  thermocktat-knx-0:
    image: ghcr.io/agrid-dev/thermocktat:v0.9.0
    environment:
      TMK_DEVICE_ID: TMK_knx_0
      TMK_CONTROLLERS_HTTP_ENABLED: "true"
      TMK_CONTROLLERS_KNX_ENABLED: "true"
      # State-change telegrams pushed to the tunnel client every 1s
      # (default 10s) so external updates surface quickly.
      TMK_CONTROLLERS_KNX_PUBLISH_INTERVAL: 1s
    ports:
      - "9084:8080"
