# HTTP driver for the thermocktat emulators in compose.override.yaml.
# Mirrors the reference driver from gridone-setup (.db/drivers/
# thermocktat_http.yaml), plus test-env deltas: fast polling (5s) so read-back
# assertions resolve quickly, and a fault_code attribute mapped to readable
# labels through the mapping codec.
#
# NOTE: the reference file uses an attribute-level `json_pointer:` shorthand
# that current gridone silently ignores (AttributeDriver only reads `codecs:`,
# unknown fields are dropped) — every read here uses the supported list form.
id: thermocktat_http
transport: http
type: thermostat

update_strategy:
  polling: 5s

device_config:
  - name: ip

attributes:
  - name: temperature
    data_type: float
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /ambient_temperature

  - name: temperature_setpoint
    data_type: float
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /temperature_setpoint
    write:
      method: "POST"
      path: "${ip}/v1/temperature_setpoint"
      body:
        value: ${value}

  - name: onoff_state
    data_type: bool
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /enabled
    write:
      method: "POST"
      path: "${ip}/v1/enabled"
      body:
        value: ${value}

  - name: temperature_setpoint_min
    data_type: float
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /temperature_setpoint_min
    write:
      method: "POST"
      path: "${ip}/v1/temperature_setpoint_min"
      body:
        value: ${value}

  - name: temperature_setpoint_max
    data_type: float
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /temperature_setpoint_max
    write:
      method: "POST"
      path: "${ip}/v1/temperature_setpoint_max"
      body:
        value: ${value}

  - name: fan_speed
    data_type: str
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /fan_speed
    write:
      method: "POST"
      path: "${ip}/v1/fan_speed"
      body:
        value: ${value}

  - name: mode
    data_type: str
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /mode
    write:
      method: "POST"
      path: "${ip}/v1/mode"
      body:
        value: ${value}

  - name: fault_code
    data_type: str
    read: "GET ${ip}/v1"
    codecs:
      - json_pointer: /fault_code
      - mapping:
          0: ok
          1: firmware_error
          2: oops_error
          3: disastrous_internal_error
